<div class="calculator">
    <div class="buttons">
        @for (num of boutons; track num) {
        <div class="shadow-button">
            <button type="button" class="btn btn-primary btn-lg">{{ num }}</button>
        </div>
        }
        <div class="shadow-button btn-clear-parent">
            <button type="button" class="btn btn-danger btn-lg btn-clear">C</button>
        </div>
    </div>
</div>
